<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Website</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      max-width: 500px;
    }

    h1 {
      margin-bottom: 12px;
      font-size: 2rem;
    }

    p {
      margin-bottom: 20px;
      line-height: 1.6;
    }

    a {
      display: inline-block;
      text-decoration: none;
      background: #222;
      color: white;
      padding: 10px 18px;
      border-radius: 8px;
    }

    a:hover {
      background: #444;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Hello, I'm Jaeseung</h1>
    <p>Welcome to my GitHub Pages website.</p>
    <a href="https://github.com/">Visit GitHub</a>
  </div>
</body>
</html>
